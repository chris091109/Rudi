animations {
    enabled = yes

    # Bezier curves from animations.conf
    bezier = smoothOut, 0.36, 0, 0.6, -1.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    bezier = overShoot, 0.05, 0.9, 0.1, 1.05
    bezier = softSnap, 0.4, 0, 0.2, 1
    bezier = fluent, 0.0, 0, 0.2, 1.0

    # Workspace animations using the new beziers
    animation = workspaces, 1, 5, overShoot, slide

    # Window animations using the new beziers
    animation = windows, 1, 4, overShoot, popin 80%
    animation = windowsIn, 1, 4, overShoot, popin 80%
    animation = windowsOut, 1, 4, smoothOut, popin 95%
    animation = windowsMove, 1, 4, softSnap, popin 80%
    animation = fade, 1, 2, fluent
    animation = border, 1, 3, smoothIn
    animation = layers, 1, 3, softSnap
}
